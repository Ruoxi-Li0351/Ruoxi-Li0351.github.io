name: Update Premier League Table

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch Premier League standings
        run: |
          DATA=$(curl -fsSL "https://sdp-prem-prod.premier-league-prod.pulselive.com/api/v5/competitions/8/seasons/2025/standings")
          echo "$DATA" | jq . > /dev/null

          {
            echo '<table>'
            echo '  <thead><tr><th>Rank</th><th>Team</th><th>Pts</th></tr></thead>'
            echo '  <tbody>'
            echo "$DATA" | jq -r '
              .tables[0].entries
              | to_entries[]
              | "    <tr><td>\(.key + 1)</td><td>\(.value.team.name)</td><td>\(.value.overall.points)</td></tr>"
            '
            echo '  </tbody>'
            echo '</table>'
          } > table.html

      - name: Inject table into page
        run: |
          awk '
          /<!-- TABLE_START -->/ {
            print
            system("cat table.html")
            skip=1
            next
          }
          /<!-- TABLE_END -->/ {skip=0}
          !skip
          ' _pages/sam.md > tmp.md && mv tmp.md _pages/sam.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _pages/sam.md
          git commit -m "Update Premier League table" || echo "No changes"
          git push
