name: Update Premier League Table

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch Premier League standings
        run: |
          DATA=$(curl -fsSL "https://sdp-prem-prod.premier-league-prod.pulselive.com/api/v5/competitions/8/seasons/2025/standings")
          echo "$DATA" | jq . > /dev/null

          {
            echo '<style>'
            echo '.pl-table-wrap{margin:1rem 0;border-radius:12px;border:1px solid #e5e7eb;}'
            echo '.pl-table{border-collapse:separate;border-spacing:0;width:100%;font-size:14px;background:#fff;}'
            echo '.pl-table th,.pl-table td{padding:8px 10px;text-align:center;border-bottom:1px solid #e5e7eb;white-space:nowrap;}'
            echo '.pl-table thead th{background:#111827;color:#fff;font-weight:600;}'
            echo '.pl-table td.team,.pl-table th.team{text-align:left;}'
            echo '.pl-table tr:nth-child(even){background:#f9fafb;}'
            echo '.pl-table tr:hover{background:#eef2ff;}'
            echo '.pl-table tr.ucl td:first-child{border-left:4px solid #16a34a;}'
            echo '.pl-table tr.uel td:first-child{border-left:4px solid #1d4ed8;}'
            echo '.pl-table tr.uecl td:first-child{border-left:4px solid #60a5fa;}'
            echo '.pl-table tr.rel td:first-child{border-left:4px solid #dc2626;}'
            echo '.pl-rank{font-weight:600;}'
            echo '.pl-pts{font-weight:700;}'
            echo '.pl-note{margin-top:8px;color:#6b7280;font-size:13px;}'
            echo '</style>'

            echo '<div class="pl-table-wrap">'
            echo '<table class="pl-table">'
            echo '<thead><tr><th>Rank</th><th class="team">Team</th><th>PL</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>PTS</th></tr></thead>'
            echo '<tbody>'

            echo "$DATA" | jq -r '
              .tables[0].entries
              | to_entries[]
              | [
                  (.key + 1),
                  .value.team.name,
                  (.value.overall.played // 0),
                  (.value.overall.won // 0),
                  (.value.overall.drawn // 0),
                  (.value.overall.lost // 0),
                  ((.value.overall.goalsFor // 0) - (.value.overall.goalsAgainst // 0)),
                  (((.value.overall.won // 0) * 3) + (.value.overall.drawn // 0))
                ] | @tsv
            ' | while IFS=$'\t' read -r rank team played won drawn lost gd pts; do

              row_class=""
              if [ "$rank" -le 5 ]; then
                row_class="ucl"
              elif [ "$rank" -eq 6 ]; then
                row_class="uel"
              elif [ "$rank" -eq 7 ]; then
                row_class="uecl"
              elif [ "$rank" -ge 18 ]; then
                row_class="rel"
              fi

              # capture Manchester United rank
              if [ "$team" = "Manchester United" ]; then
                manu_rank=$rank
              fi

              echo "<tr class=\"$row_class\"><td class=\"pl-rank\">$rank</td><td class=\"team\">$team</td><td>$played</td><td>$won</td><td>$drawn</td><td>$lost</td><td>$gd</td><td class=\"pl-pts\">$pts</td></tr>"
            done

            echo '</tbody></table>'

            # 👇 dynamic sentence
            echo "<p class=\"pl-note\">As a huge Manchester United fan, I’m following the 2025–2026 season closely—currently, we are competing on a single front and sit <b>$manu_rank</b> in the Premier League.</p>"

            echo '</div>'
          } > table.html

      - name: Inject table into page
        run: |
          awk '
          /<!-- TABLE_START -->/ {
            print
            system("cat table.html")
            skip=1
            next
          }
          /<!-- TABLE_END -->/ {skip=0}
          !skip
          ' _pages/sam.md > tmp.md && mv tmp.md _pages/sam.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _pages/sam.md
          git commit -m "Update Premier League table" || echo "No changes"
          git push
